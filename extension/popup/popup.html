<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>VoiceFlow Local</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 300px;
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0f0f1a;
      color: #eaeaea;
      padding: 16px;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
      border-bottom: 1px solid #2a2a3e;
      padding-bottom: 12px;
    }
    .header h1 { font-size: 1rem; font-weight: 700; }
    .header .logo { font-size: 1.4rem; }

    .status-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 16px;
      font-size: 0.85rem;
      color: #a0a0b0;
    }
    .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .dot.idle       { background: #555; }
    .dot.loading    { background: #ff9800; animation: blink 1s infinite; }
    .dot.ready      { background: #4caf50; }
    .dot.transcribing { background: #e94560; animation: blink 0.6s infinite; }
    .dot.error      { background: #f44336; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

    .progress-wrap { margin-bottom: 16px; }
    progress {
      width: 100%; height: 6px; border: none;
      border-radius: 3px; background: #2a2a3e;
    }
    progress::-webkit-progress-bar  { background: #2a2a3e; border-radius: 3px; }
    progress::-webkit-progress-value { background: #e94560; border-radius: 3px; }
    .progress-label { font-size: 0.75rem; color: #a0a0b0; margin-top: 4px; }

    .section { margin-bottom: 14px; }
    .section label {
      display: block;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #a0a0b0;
      margin-bottom: 6px;
    }
    select {
      width: 100%;
      background: #1a1a2e;
      border: 1px solid #2a2a3e;
      border-radius: 8px;
      color: #eaeaea;
      padding: 7px 10px;
      font-size: 0.88rem;
    }

    .hotkey-hint {
      background: #1a1a2e;
      border: 1px solid #2a2a3e;
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 0.82rem;
      color: #a0a0b0;
      margin-bottom: 14px;
    }
    kbd {
      background: #2a2a3e;
      border: 1px solid #3a3a4e;
      border-radius: 4px;
      padding: 1px 6px;
      font-family: monospace;
      font-size: 0.8rem;
      color: #eaeaea;
    }

    .btn {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.9rem;
      font-weight: 600;
      transition: opacity 0.2s;
      margin-bottom: 8px;
    }
    .btn:hover:not(:disabled) { opacity: 0.85; }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-primary { background: #e94560; color: #fff; }
    .btn-ghost {
      background: transparent;
      border: 1px solid #2a2a3e;
      color: #a0a0b0;
    }
    .btn-ghost:hover:not(:disabled) { border-color: #e94560; color: #eaeaea; }

    .footer {
      font-size: 0.72rem;
      color: #555;
      text-align: center;
      margin-top: 8px;
    }
    .footer a { color: #7070a0; text-decoration: none; }
  </style>
</head>
<body>
  <div class="header">
    <span class="logo">🎙</span>
    <h1>VoiceFlow Local</h1>
  </div>

  <div class="status-row">
    <span class="dot" id="statusDot"></span>
    <span id="statusText">Aguardando...</span>
  </div>

  <div class="progress-wrap" id="progressWrap" style="display:none">
    <progress id="progressBar" value="0" max="100"></progress>
    <div class="progress-label" id="progressLabel"></div>
  </div>

  <div class="hotkey-hint">
    Atalho: <kbd>Ctrl</kbd>+<kbd>Shift</kbd>+<kbd>Space</kbd>
    &nbsp;|&nbsp;
    <a id="shortcutsLink" href="#" style="color:#7070a0;font-size:0.8rem">Personalizar</a>
  </div>

  <div class="section">
    <label>Modelo</label>
    <select id="modelSelect">
      <option value="Xenova/whisper-tiny">Tiny (~40MB) — mais rápido</option>
      <option value="Xenova/whisper-base">Base (~140MB) — equilibrado</option>
      <option value="Xenova/whisper-small">Small (~500MB) — mais preciso</option>
    </select>
  </div>

  <div class="section">
    <label>Idioma</label>
    <select id="langSelect">
      <option value="portuguese">Português</option>
      <option value="english">English</option>
      <option value="spanish">Español</option>
    </select>
  </div>

  <button class="btn btn-primary" id="loadBtn" type="button">▶ Carregar Modelo</button>
  <button class="btn btn-ghost" id="pwaBtn" type="button">Abrir PWA completo ↗</button>

  <div class="footer">
    Extensão local · sem custos · sem servidor<br>
    <a id="shortcutsLink2" href="#">Alterar atalho de teclado</a>
  </div>

  <script src="popup.js"></script>
</body>
</html>
